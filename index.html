<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab Dev Environment — It Works!</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1e293b, #0f172a 60%); color: #e2e8f0;
    }
    .card {
      text-align: center; padding: 3rem 3.5rem; border-radius: 1rem;
      background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    }
    .badge {
      display: inline-block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #34d399; border: 1px solid #34d39955; border-radius: 999px; padding: 0.25rem 0.75rem; margin-bottom: 1.25rem;
    }
    h1 { font-size: 2.25rem; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; }
    code { background: #0f172a; padding: 0.15rem 0.4rem; border-radius: 0.3rem; color: #38bdf8; font-size: 0.9em; }
    .meta { margin-top: 1.5rem; font-size: 0.85rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">● Live on majlis-lab</span>
    <h1>Hello from the Homelab 👋</h1>
    <p>This page was pulled from GitHub and deployed by <strong>Coolify</strong><br />on the <code>majlis-lab</code> dev server.</p>
    <p class="meta">If you can see this, the full pipeline works:<br />GitHub → Coolify build → nginx → you.</p>
  </div>
</body>
</html>
